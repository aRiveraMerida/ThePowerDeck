<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>[TÍTULO DEL DECK] — thePower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Tema THEPOWER (por defecto): Space Grotesk + Inter + JetBrains Mono -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Tema EDITORIAL (alternativo): descomentar y poner class="editorial" en <html>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
-->
<style>
/* ============================================================
   TOKENS — sistema thePower (deck oscuro)  [TEMA POR DEFECTO]
   ============================================================ */
:root{
  --ink:#0B1F22; --ink-2:#102B2E; --ink-3:#143438;
  --paper:#F7F4EC; --paper-2:#E8E2D8; --muted:#A6B4B0;
  --mint:#9ED9C4; --mint-2:#C9F3E5; --mint-3:#E8FFF7;
  --lime:#D7FF63; --blue:#A9C7FF; --coral:#FF8F70;
  --green:#7BE0B0; --purple:#C9B8FF; --gold:#F2C76E;
  --acc:var(--mint);              /* acento principal */
  --acc-2:var(--lime);            /* acento secundario / degradados */
  --line:rgba(247,244,236,.14);
  --line-strong:rgba(158,217,196,.38);
  --fill-1:rgba(247,244,236,.05); /* fondo de tarjeta */
  --display:"Space Grotesk",Inter,system-ui,sans-serif;
  --sans:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
}
/* ---- TEMA EDITORIAL (carbón + verde señal + Fraunces) ----
   Activar con <html class="editorial"> + descomentar el <link> de Fraunces. */
html.editorial{
  --ink:#0c0d11; --ink-2:#13151b; --ink-3:#15171e;
  --paper:#ece6da; --paper-2:#d8d2c6; --muted:#9a958a;
  --mint:#c8f04a; --mint-2:#dcff7a; --mint-3:#eaffb0;
  --lime:#c8f04a; --blue:#9fb6ff; --coral:#f0a44a;
  --acc:#c8f04a; --acc-2:#86a52e;
  --line:rgba(236,230,218,.14);
  --line-strong:rgba(200,240,74,.34);
  --fill-1:rgba(236,230,218,.05);
  --display:"Fraunces",Georgia,serif;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
html.editorial h1,html.editorial h2{font-weight:400;letter-spacing:-.01em}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#000;color:var(--paper);font-family:var(--sans);
  overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
}

/* ============================================================
   STAGE + ESCALADO 16:9 — NO TOCAR
   .slide es lienzo 16:9 con container-type:size. Dentro de una
   escena TODO se dimensiona en cqh/cqw (nunca px/vw/vh).
   ============================================================ */
.stage{
  position:fixed;inset:0;display:grid;place-items:center;
  background:radial-gradient(120% 120% at 50% -10%, var(--ink-3) 0%, var(--ink) 55%, #07090a 100%);
}
.slide{
  position:relative;
  width:min(100vw, 177.78vh);
  height:min(56.25vw, 100vh);
  container-type:size;
  overflow:hidden;
  background:
    radial-gradient(46% 50% at 84% 6%, rgba(158,217,196,.20), transparent 72%),
    radial-gradient(36% 42% at 8% 96%, rgba(215,255,99,.09), transparent 72%),
    radial-gradient(30% 36% at 70% 92%, rgba(169,199,255,.05), transparent 72%),
    linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 48%, var(--ink) 100%);
}
.slide::after{ /* grano */
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/></svg>");
}
#net{position:absolute;inset:0;width:100%;height:100%;opacity:.45;pointer-events:none} /* red de nodos opcional */
/* malla + destellos thePower (el difuminado de marca). Borra <div class="bgfx"> del DOM para fondo limpio */
.bgfx{position:absolute;inset:0;pointer-events:none}
.bgfx::before{content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(158,217,196,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(158,217,196,.05) 1px, transparent 1px);
  background-size:6cqh 6cqh;
  -webkit-mask-image:radial-gradient(80% 80% at 50% 50%,#000 0%,transparent 78%);
  mask-image:radial-gradient(80% 80% at 50% 50%,#000 0%,transparent 78%);
  opacity:.55;
}
.bgfx::after{content:"";position:absolute;inset:0;
  background:
    radial-gradient(.3cqh .3cqh at 20% 14%, rgba(201,243,229,.5), transparent 70%),
    radial-gradient(.25cqh .25cqh at 72% 9%, rgba(215,255,99,.45), transparent 70%),
    radial-gradient(.25cqh .25cqh at 84% 30%, rgba(169,199,255,.4), transparent 70%),
    radial-gradient(.25cqh .25cqh at 12% 62%, rgba(201,243,229,.35), transparent 70%),
    radial-gradient(.25cqh .25cqh at 88% 72%, rgba(215,255,99,.3), transparent 70%);
  opacity:.35;
}

.brand{position:absolute;top:4cqh;left:4cqw;height:3.4cqh;z-index:5;opacity:.92}
.brand img{height:100%;width:auto;display:block}
/* coibranding: <div class="brand cob"><img ...> <span class="x">×</span> <span class="chipw"><img ...></span></div> */
.brand.cob{display:flex;align-items:center;gap:1.2cqw}
.brand .x{font-family:var(--mono);font-size:1.8cqh;color:var(--acc);font-weight:700}
.brand .chipw{height:100%;display:flex;align-items:center;background:#fff;border-radius:.9cqh;padding:.5cqh 1cqw}
.brand .chipw img{height:100%}

/* ============================================================
   ESCENAS
   ============================================================ */
.scene{display:none;position:absolute;inset:0;padding:8cqh 8cqw;isolation:isolate}
.scene.active{display:flex;flex-direction:column;justify-content:center}  /* centrado vertical POR DEFECTO */
.scene.top{justify-content:flex-start;padding-top:9cqh}                    /* escenas densas (tabla larga, seq 6 filas) */
.scene.center-h{align-items:center;text-align:center}                      /* centrado también horizontal (frases únicas) */
.scene .center{display:flex;flex-direction:column;justify-content:center;height:100%} /* compat */
/* marca de agua difuminada thePower: <section class="scene" data-wm="thePower"> */
.scene[data-wm]::before{
  content:attr(data-wm);position:absolute;right:-4cqw;top:50%;z-index:-1;
  transform:translateY(-50%) rotate(-6deg);
  font-family:var(--display);font-size:24cqh;font-weight:700;letter-spacing:-.08em;
  color:rgba(158,217,196,.055);pointer-events:none;white-space:nowrap;
}
html.editorial .scene[data-wm]::before{color:rgba(200,240,74,.05)}

.crop{position:absolute;width:1.4cqw;height:1.4cqw;border-color:var(--line);border-style:solid;opacity:.7}
.crop.tl{top:3.4cqh;left:3.4cqw;border-width:1px 0 0 1px}
.crop.tr{top:3.4cqh;right:3.4cqw;border-width:1px 1px 0 0}
.crop.bl{bottom:3.4cqh;left:3.4cqw;border-width:0 0 1px 1px}
.crop.br{bottom:3.4cqh;right:3.4cqw;border-width:0 1px 1px 0}

/* ============================================================
   TIPOGRAFÍA
   ============================================================ */
h1,h2{font-family:var(--display);font-weight:700;line-height:1.02;letter-spacing:-.03em;text-wrap:balance}
.eyebrow{font-family:var(--mono);font-size:1.7cqh;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:1.2cqw}
.eyebrow .num{color:var(--muted)}
.eyebrow::before{content:"";width:3.4cqw;height:1px;background:var(--acc);display:inline-block}
.title{font-family:var(--display);font-size:6cqh;line-height:1.04;margin-top:2.8cqh;letter-spacing:-.03em}
.title.underlined{padding-bottom:.4em;position:relative}
.title.underlined::after{content:"";position:absolute;left:0;bottom:0;width:7cqw;height:.5cqh;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--acc-2))}
.lead{font-family:var(--display);font-weight:500;font-size:3cqh;line-height:1.2;color:var(--paper-2)}
.body{font-size:2.4cqh;line-height:1.5;color:var(--paper-2);max-width:64cqw}
.muted{color:var(--muted)} .acc{color:var(--acc)} .acc-2{color:var(--acc-2)}
.c-blue{color:var(--blue)} .c-coral{color:var(--coral)} .c-gold{color:var(--gold)} .c-purple{color:var(--purple)} .c-green{color:var(--green)}
.mono{font-family:var(--mono)}
mark{background:none;color:var(--acc);font-weight:600}
.strike{text-decoration:line-through;text-decoration-color:var(--muted);color:var(--muted)}

.over{display:inline-flex;align-items:center;width:max-content;max-width:100%;font-family:var(--mono);font-size:1.5cqh;line-height:1;letter-spacing:.13em;text-transform:uppercase;color:var(--mint-3);background:rgba(158,217,196,.14);border:1px solid var(--line-strong);border-radius:999px;padding:.9cqh 1.4cqw;font-weight:700}

/* iconos del set embebido: <svg class="ico"><use href="#i-check"/></svg> */
.ico{width:1.2em;height:1.2em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.22em}
.ico.lg{width:3.6cqh;height:3.6cqh}
.ico.xl{width:6cqh;height:6cqh}

/* ============================================================
   ANIMACIÓN DE ENTRADA
   ============================================================ */
@keyframes sceneIn{from{opacity:0}to{opacity:1}}
.scene.active{animation:sceneIn .5s ease both}
@keyframes kenburns{0%{transform:scale(1.02) translate(0,0)}100%{transform:scale(1.16) translate(-2.5%,-1.5%)}}
.kenburns{animation:kenburns 22s ease-out both!important;transform-origin:center}
@media (prefers-reduced-motion:reduce){.kenburns{animation:none!important}}
.scene.active .reveal{animation:rise .8s cubic-bezier(.2,.7,.2,1) both}
.scene.active .reveal:nth-child(1){animation-delay:.05s}
.scene.active .reveal:nth-child(2){animation-delay:.15s}
.scene.active .reveal:nth-child(3){animation-delay:.25s}
.scene.active .reveal:nth-child(4){animation-delay:.35s}
.scene.active .reveal:nth-child(5){animation-delay:.45s}
.scene.active .reveal:nth-child(6){animation-delay:.55s}
.scene.active .reveal:nth-child(7){animation-delay:.65s}
.scene.active .reveal:nth-child(8){animation-delay:.75s}
@keyframes rise{from{opacity:0;transform:translateY(2.4cqh)}to{opacity:1;transform:none}}
/* gráficos: dibujado al entrar */
.scene.active .drawin{animation:drawin 1.1s ease .35s both}
@keyframes drawin{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){
  .scene.active .reveal,.scene.active .drawin{animation:none}
}

/* ============================================================
   LIBRERÍA · BLOQUES DE TEXTO Y ESTRUCTURA
   ============================================================ */

/* — AGENDA / ÍNDICE — */
.agenda{margin-top:5cqh;display:flex;flex-direction:column;max-width:74cqw}
.agenda .ag{display:grid;grid-template-columns:7cqw 1fr auto;gap:2.5cqw;align-items:baseline;padding:2.2cqh 0;border-bottom:1px solid var(--line)}
.agenda .ag:last-child{border-bottom:none}
.agenda .ag .n{font-family:var(--mono);font-size:2cqh;color:var(--acc);letter-spacing:.1em}
.agenda .ag .t{font-family:var(--display);font-size:3.6cqh;letter-spacing:-.02em}
.agenda .ag .m{font-family:var(--mono);font-size:1.6cqh;color:var(--muted)}

/* — DIVIDER de sección (número gigante) — */
.sdiv{display:grid;grid-template-columns:auto 1fr;gap:4cqw;align-items:center;height:100%}
.sdiv .big{font-family:var(--display);font-size:34cqh;line-height:.8;font-weight:700;letter-spacing:-.06em;color:var(--acc);opacity:.92;text-shadow:0 0 8cqh rgba(158,217,196,.18)}
.sdiv .st{font-family:var(--display);font-size:6.4cqh;line-height:1.04;letter-spacing:-.03em;max-width:46cqw}
.sdiv .sd{font-size:2.2cqh;color:var(--muted);margin-top:2cqh;max-width:44cqw;line-height:1.5}

/* — QUOTE — */
.quote{max-width:78cqw}
.quote .qmark{font-family:var(--display);font-size:14cqh;line-height:.4;color:var(--acc);display:block;margin-bottom:3cqh}
.quote .qt{font-family:var(--display);font-weight:500;font-size:4.6cqh;line-height:1.18;letter-spacing:-.02em}
.quote .qa{margin-top:3.4cqh;font-family:var(--mono);font-size:1.8cqh;color:var(--muted);letter-spacing:.1em}
.quote .qa b{color:var(--acc)}

/* — STAT ROW — */
.stat-row{display:flex;gap:5cqw;margin-top:7cqh;align-items:flex-start;flex-wrap:wrap}
.stat .fig{font-family:var(--display);font-size:11cqh;line-height:.9;color:var(--acc);font-weight:700}
.stat .lbl{font-size:2cqh;color:var(--muted);margin-top:1cqh;max-width:22cqw;line-height:1.3}
.stat .lbl b{color:var(--paper);font-weight:600}

/* — KPI GRID (cifras en tarjetas) — */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1.8cqw;margin-top:6cqh}
.kpis.three{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--fill-1);border:1px solid var(--line);border-radius:2cqh;padding:3cqh 1.8cqw;text-align:center}
.kpi .kv{font-family:var(--display);font-size:6.4cqh;font-weight:700;letter-spacing:-.04em;color:var(--acc);line-height:.95}
.kpi .kv small{font-size:.5em}
.kpi .kl{font-size:1.8cqh;color:var(--muted);margin-top:1.2cqh;line-height:1.35}
.kpi.lift{border-color:var(--line-strong);background:linear-gradient(135deg,rgba(158,217,196,.10),rgba(215,255,99,.04))}
.kpi.lift .kv{color:var(--acc-2)}

/* — TWO COL — */
.twocol{display:grid;grid-template-columns:1fr 1px 1fr;gap:5cqw;margin-top:6cqh;align-items:start}
.twocol .divider{background:var(--line);height:34cqh;align-self:center}
.col h3{font-family:var(--mono);font-size:1.8cqh;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:2.4cqh}
.col .big{font-family:var(--display);font-size:5cqh;line-height:1.05;margin-bottom:2cqh;letter-spacing:-.02em}
.col p{font-size:2.2cqh;line-height:1.45;color:var(--muted);max-width:30cqw}
.col.hot h3{color:var(--acc)} .col.hot .big{color:var(--paper)}

/* — SPLIT genérico texto | visual — */
.split{display:grid;grid-template-columns:1fr 1.1fr;gap:5cqw;margin-top:4cqh;align-items:center}
.split.rev{grid-template-columns:1.1fr 1fr}

/* — STEPS — */
.steps{display:flex;gap:2.2cqw;margin-top:7cqh;align-items:flex-end}
.step{flex:1;border-top:1px solid var(--line);padding-top:2cqh}
.step .bar{height:.7cqh;background:var(--muted);margin-bottom:2cqh;border-radius:2px}
.step:nth-child(1) .bar{width:22%} .step:nth-child(2) .bar{width:46%}
.step:nth-child(3) .bar{width:72%} .step:nth-child(4) .bar{width:100%;background:var(--acc)}
.step .k{font-family:var(--mono);font-size:1.6cqh;color:var(--muted);letter-spacing:.18em}
.step .t{font-family:var(--display);font-size:4.4cqh;margin:1cqh 0 1.4cqh;letter-spacing:-.02em}
.step .d{font-size:1.85cqh;color:var(--muted);line-height:1.4}
.step.last .t{color:var(--acc)}

/* — LAYERS — */
.layers{display:flex;flex-direction:column;gap:2.2cqh;margin-top:6cqh;max-width:70cqw}
.layer{display:grid;grid-template-columns:13cqw 1fr;gap:3cqw;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:2.2cqh}
.layer .n{font-family:var(--mono);color:var(--acc);font-size:2cqh;letter-spacing:.1em}
.layer .h{font-family:var(--display);font-size:4cqh;letter-spacing:-.02em}
.layer .s{font-size:2cqh;color:var(--muted);margin-top:.6cqh;line-height:1.4}

/* — QLIST — */
.qlist{margin-top:6cqh;display:flex;flex-direction:column;gap:3cqh;max-width:78cqw}
.q{display:grid;grid-template-columns:8cqw 1fr;gap:2.5cqw;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:3cqh}
.q .qn{font-family:var(--display);font-size:6cqh;color:var(--acc);line-height:.8}
.q .txt{font-family:var(--display);font-weight:500;font-size:3.4cqh;line-height:1.18}

/* — CARDS — */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:2cqw;margin-top:6cqh}
.cards.two{grid-template-columns:repeat(2,1fr)}
.cards.four{grid-template-columns:repeat(4,1fr)}
.card{background:var(--fill-1);border:1px solid var(--line);border-radius:2.2cqh;padding:3.2cqh 2.4cqw;position:relative;overflow:hidden}
.card .ctag{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-weight:700}
.card .cname{font-family:var(--display);font-size:3.4cqh;margin:1.4cqh 0 1.2cqh;letter-spacing:-.03em;color:var(--paper);line-height:1.06}
.card .cd{font-size:2cqh;color:var(--muted);line-height:1.45}
.card .cico{color:var(--acc);margin-bottom:1.4cqh}
.card.blue{border-color:rgba(169,199,255,.3)} .card.blue .ctag,.card.blue .cico{color:var(--blue)}
.card.coral{border-color:rgba(255,143,112,.3)} .card.coral .ctag,.card.coral .cico{color:var(--coral)}
.card.gold{border-color:rgba(242,199,110,.3)} .card.gold .ctag,.card.gold .cico{color:var(--gold)}
.card.purple{border-color:rgba(201,184,255,.3)} .card.purple .ctag,.card.purple .cico{color:var(--purple)}

/* — CHIPS — */
.chips{display:flex;gap:1.2cqw;flex-wrap:wrap;margin-top:4cqh}
.chip{font-family:var(--mono);font-size:1.7cqh;border:1px solid var(--line);border-radius:999px;padding:.9cqh 1.6cqw;color:var(--muted)}
.chip.on{color:var(--ink);background:var(--acc);border-color:transparent;font-weight:700}

/* — CALLOUT — */
.callout{margin-top:6cqh;border:1px solid var(--line-strong);border-radius:2.6cqh;padding:4cqh 3.4cqw;background:linear-gradient(135deg,rgba(158,217,196,.10),rgba(215,255,99,.04))}
.callout .ct{font-family:var(--display);font-size:4.4cqh;line-height:1.1;letter-spacing:-.03em;max-width:48cqw}
.callout .ct .acc{color:var(--acc-2)}

/* — HL-BOX (decisión de diseño / nota destacada) — */
.hl-box{margin-top:4cqh;background:rgba(169,199,255,.07);border:1px solid rgba(169,199,255,.30);border-radius:2.2cqh;padding:3cqh 2.6cqw;max-width:70cqw}
.hl-box .hk{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);font-weight:700;display:block;margin-bottom:1.2cqh}
.hl-box .ht{font-family:var(--display);font-size:3cqh;letter-spacing:-.03em;margin-bottom:1.2cqh}
.hl-box p{font-size:2cqh;line-height:1.5;color:var(--paper-2)}

/* — TABLE / TARIFARIO — */
.tbl{margin-top:5cqh;border:1px solid var(--line);border-radius:1.8cqh;overflow:hidden}
.tbl .tr{display:grid;grid-template-columns:var(--cols,1.5fr 1fr 1fr 1.4fr);gap:2cqw;padding:2cqh 2.4cqw;align-items:center}
.tbl .th{background:rgba(158,217,196,.10);border-bottom:1px solid var(--line-strong);font-family:var(--mono);font-size:1.4cqh;letter-spacing:.1em;text-transform:uppercase;color:var(--mint-2);font-weight:700}
.tbl .tb{border-bottom:1px solid rgba(247,244,236,.07);font-size:2cqh;color:var(--paper-2)}
.tbl .tb:last-child{border-bottom:none}
.tbl .tb b{color:var(--paper);font-weight:700}
.tbl .tb .num{font-family:var(--mono);color:var(--acc-2);font-weight:700}
.tbl .tb .sub{display:block;font-size:1.6cqh;color:var(--muted);margin-top:.4cqh}
.tbl .total{display:flex;justify-content:space-between;align-items:baseline;gap:2cqw;padding:2.6cqh 2.4cqw;background:rgba(215,255,99,.07);border-top:1px solid rgba(215,255,99,.30)}
.tbl .total .tl{font-family:var(--mono);font-size:1.6cqh;letter-spacing:.13em;text-transform:uppercase;color:var(--acc-2);font-weight:700}
.tbl .total .tv{font-family:var(--display);font-size:5cqh;font-weight:700;letter-spacing:-.04em;color:var(--acc-2)}

/* — COMPARE (dos paneles antes/ahora) — */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:2cqw;margin-top:5cqh}
.cmp{border-radius:2.4cqh;padding:3.2cqh 2.6cqw}
.cmp.old{background:var(--fill-1);border:1px solid var(--line)}
.cmp.new{background:linear-gradient(135deg,rgba(158,217,196,.10),rgba(215,255,99,.05));border:1px solid var(--line-strong)}
.cmp .cmt{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.13em;text-transform:uppercase;font-weight:700;display:block;margin-bottom:2cqh}
.cmp.old .cmt{color:var(--muted)} .cmp.new .cmt{color:var(--acc-2)}
.cmp .row{display:flex;justify-content:space-between;align-items:baseline;gap:2cqw;padding:1.5cqh 0;border-bottom:1px solid rgba(247,244,236,.08)}
.cmp .row:last-of-type{border-bottom:none}
.cmp .row .k{font-size:1.9cqh;color:var(--muted);font-weight:600}
.cmp .row .v{font-family:var(--mono);font-size:2.1cqh;font-weight:700;color:var(--paper-2);white-space:nowrap}
.cmp.new .row .v{color:var(--paper)}
.cmp .bigv{margin-top:2.2cqh;padding-top:2.2cqh;border-top:1px solid var(--line)}
.cmp .bigv .bl{font-family:var(--mono);font-size:1.4cqh;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.8cqh}
.cmp .bigv .bv{font-family:var(--display);font-size:6cqh;font-weight:700;letter-spacing:-.05em;line-height:.95}
.cmp.old .bigv .bv{color:var(--paper-2)} .cmp.new .bigv .bv{color:var(--acc-2)}

/* — SHIFT CARDS (antes tachado → ahora) — */
.shifts{display:grid;grid-template-columns:repeat(3,1fr);gap:1.8cqw;margin-top:5cqh}
.shift{background:var(--fill-1);border:1px solid var(--line);border-radius:2cqh;padding:2.8cqh 2cqw}
.shift .sk{font-family:var(--mono);font-size:1.4cqh;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:1.4cqh}
.shift .so{font-family:var(--mono);font-size:2cqh;color:var(--muted);font-weight:700;text-decoration:line-through;text-decoration-color:rgba(255,143,112,.6);display:block;margin-bottom:.7cqh}
.shift .sn{font-family:var(--display);font-size:4cqh;font-weight:700;letter-spacing:-.04em;color:var(--acc);line-height:1}
.shift .sd{margin-top:1.2cqh;font-size:1.8cqh;color:var(--paper-2);line-height:1.45}

/* — SEQ (secuencia de items con tipo) — */
.seq{display:grid;gap:1cqh;margin-top:4.5cqh}
.seq-row{display:grid;grid-template-columns:auto auto 1fr auto;gap:2cqw;align-items:center;padding:1.6cqh 2cqw;border-radius:1.6cqh;background:var(--fill-1);border:1px solid var(--line)}
.seq-row.live{background:rgba(169,199,255,.08);border-color:rgba(169,199,255,.32)}
.seq-row .sn{font-family:var(--mono);font-size:1.7cqh;color:var(--muted);font-weight:700;min-width:2ch}
.seq-row .sk{font-family:var(--mono);font-size:1.4cqh;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:.6cqh 1.2cqw;border-radius:999px;white-space:nowrap;color:var(--mint-2);background:rgba(158,217,196,.12);border:1px solid rgba(158,217,196,.28)}
.seq-row.live .sk{color:var(--ink);background:var(--blue);border-color:transparent}
.seq-row .st{font-size:2cqh;color:var(--paper);font-weight:600;line-height:1.3}
.seq-row .sh{font-family:var(--mono);font-size:1.8cqh;color:var(--paper-2);font-weight:700;white-space:nowrap}
.seq-row.live .sh{color:var(--blue)}

/* — FEAT (lista de bullets con anillo) — */
.feat{list-style:none;display:grid;gap:1.4cqh;margin-top:4.5cqh;max-width:74cqw}
.feat li{padding:2cqh 2.2cqw 2cqh 5cqw;position:relative;font-size:2.1cqh;color:var(--paper-2);background:var(--fill-1);border:1px solid var(--line);border-radius:1.8cqh;line-height:1.45}
.feat li::before{content:"";position:absolute;left:2cqw;top:50%;transform:translateY(-50%);width:1.8cqh;height:1.8cqh;border-radius:50%;background:rgba(158,217,196,.15);border:2px solid var(--acc)}
.feat li strong{color:var(--paper)}

/* ============================================================
   LIBRERÍA · DIAGRAMAS Y GRÁFICOS (CSS + SVG)
   Snippets parametrizados en references/charts-svg.md
   ============================================================ */

/* — HBAR: barras horizontales comparativas con score — */
.hbars{display:flex;flex-direction:column;gap:1.8cqh;margin-top:5cqh;max-width:76cqw}
.hbar{display:grid;grid-template-columns:14cqw 1fr auto;align-items:center;gap:2cqw}
.hbar .hn{font-family:var(--display);font-weight:700;font-size:2.2cqh;white-space:nowrap}
.hbar .track{height:2cqh;background:rgba(247,244,236,.08);border-radius:1cqh;overflow:hidden}
.hbar .fill{height:100%;border-radius:1cqh;background:linear-gradient(90deg,var(--acc),var(--acc-2));width:var(--w,50%)}
.hbar .fill.alt{background:linear-gradient(90deg,#8E7BD6,var(--purple))}
.hbar .fill.warn{background:linear-gradient(90deg,#c46a4d,var(--coral))}
.hbar .score{font-family:var(--display);font-weight:700;font-size:2.2cqh;color:var(--acc);text-align:right;min-width:3em}
.hbars .legend{display:flex;gap:2.4cqw;margin-bottom:.6cqh}
.hbars .legend span{display:inline-flex;align-items:center;gap:.6cqw;font-family:var(--mono);font-size:1.5cqh;color:var(--muted)}
.hbars .legend i{width:1.2cqh;height:1.2cqh;border-radius:.3cqh;display:inline-block}

/* — DONUT (SVG viewBox 0 0 42 42, r=15.9155 ⇒ dasharray = pct,100) — */
.donuts{display:flex;gap:4cqw;margin-top:6cqh;flex-wrap:wrap}
.donut{display:flex;flex-direction:column;align-items:center;gap:1.6cqh}
.donut svg{width:22cqh;height:22cqh;transform:rotate(-90deg)}
.donut .ring-bg{fill:none;stroke:rgba(247,244,236,.10);stroke-width:4.6}
.donut .ring{fill:none;stroke:var(--acc);stroke-width:4.6;stroke-linecap:round}
.donut .ring.lime{stroke:var(--lime)} .donut .ring.blue{stroke:var(--blue)} .donut .ring.coral{stroke:var(--coral)}
.donut .dwrap{position:relative}
.donut .dval{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-size:5cqh;font-weight:700;color:var(--paper);letter-spacing:-.03em}
.donut .dlbl{font-size:1.9cqh;color:var(--muted);max-width:20cqw;text-align:center;line-height:1.35}

/* — GAUGE (semicírculo; arco de 78.54 uds ⇒ dasharray = pct*0.7854,999) — */
.gauge{display:flex;flex-direction:column;align-items:center;gap:1cqh}
.gauge svg{width:30cqh;height:17cqh;overflow:visible}
.gauge .g-bg{fill:none;stroke:rgba(247,244,236,.10);stroke-width:6;stroke-linecap:round}
.gauge .g-fill{fill:none;stroke:var(--acc);stroke-width:6;stroke-linecap:round}
.gauge .gv{font-family:var(--display);font-size:5cqh;font-weight:700;color:var(--paper);margin-top:-6cqh}
.gauge .gl{font-size:1.9cqh;color:var(--muted)}

/* — SPARK (línea de tendencia, viewBox 0 0 100 40) — */
.spark{margin-top:5cqh;max-width:70cqw}
.spark svg{width:100%;height:30cqh;overflow:visible}
.spark .area{fill:url(#sparkgrad);opacity:.8}
.spark .ln{fill:none;stroke:var(--acc);stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round}
.spark .pt{fill:var(--ink);stroke:var(--acc);stroke-width:1}
.spark .pt.hot{fill:var(--acc-2);stroke:var(--acc-2)}
.spark .axis{stroke:var(--line);stroke-width:.3}
.spark .xl{font-family:var(--mono);font-size:3.2px;fill:var(--muted);letter-spacing:.05em}
.spark .vl{font-family:var(--display);font-size:4.5px;fill:var(--paper);font-weight:700}

/* — TIMELINE horizontal — */
.tline{position:relative;margin-top:9cqh;padding:0 2cqw}
.tline .rail{height:.5cqh;background:var(--line);border-radius:1cqh;position:relative}
.tline .rail i{position:absolute;left:0;top:0;height:100%;border-radius:1cqh;background:linear-gradient(90deg,var(--acc),var(--acc-2));width:var(--p,50%)}
.tline .marks{display:flex;justify-content:space-between;position:relative}
.tline .mk{flex:1;position:relative;padding-top:3cqh}
.tline .mk::before{content:"";position:absolute;top:-1.3cqh;left:0;width:2.2cqh;height:2.2cqh;border-radius:50%;background:var(--ink);border:.45cqh solid var(--acc)}
.tline .mk.off::before{border-color:var(--muted);opacity:.6}
.tline .mk .mt{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);font-weight:700}
.tline .mk.off .mt{color:var(--muted)}
.tline .mk .mh{font-family:var(--display);font-size:2.6cqh;letter-spacing:-.02em;margin-top:.6cqh}
.tline .mk .md{font-size:1.7cqh;color:var(--muted);margin-top:.5cqh;max-width:18cqw;line-height:1.4}

/* — FLOW / PIPELINE (nodos → flechas) — */
.flow{display:flex;align-items:center;gap:1.4cqw;margin-top:7cqh;flex-wrap:nowrap}
.fnode{background:var(--fill-1);border:1px solid var(--line-strong);border-radius:1.8cqh;padding:2.4cqh 1.8cqw;text-align:center;flex:1;min-width:0}
.fnode .fi{color:var(--acc);margin-bottom:1cqh}
.fnode .ft{font-family:var(--display);font-size:2.4cqh;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.fnode .fd{font-size:1.6cqh;color:var(--muted);margin-top:.8cqh;line-height:1.35}
.fnode.hot{background:linear-gradient(135deg,rgba(158,217,196,.14),rgba(215,255,99,.06))}
.farrow{flex:0 0 auto;color:var(--acc);display:flex;align-items:center}
.farrow svg{width:3cqw;height:3cqh}
.flow.vert{flex-direction:column;align-items:stretch;max-width:46cqw;margin-left:auto;margin-right:auto}
.flow.vert .farrow{justify-content:center;transform:rotate(90deg);height:4cqh}

/* — MATRIX 2×2 — */
.matrix{position:relative;margin-top:5cqh;width:64cqw;margin-left:auto;margin-right:auto}
.matrix .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:.8cqh;height:52cqh}
.matrix .cell{background:var(--fill-1);border:1px solid var(--line);border-radius:1.6cqh;padding:2.4cqh 1.8cqw;display:flex;flex-direction:column;gap:.8cqh}
.matrix .cell.hot{background:linear-gradient(135deg,rgba(158,217,196,.14),rgba(215,255,99,.06));border-color:var(--line-strong)}
.matrix .cell .mt{font-family:var(--display);font-size:2.6cqh;font-weight:700;letter-spacing:-.02em}
.matrix .cell.hot .mt{color:var(--acc)}
.matrix .cell .md{font-size:1.7cqh;color:var(--muted);line-height:1.4}
.matrix .ax{position:absolute;font-family:var(--mono);font-size:1.5cqh;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.matrix .ax.x{left:50%;bottom:-4cqh;transform:translateX(-50%)}
.matrix .ax.y{left:-3cqw;top:50%;transform:translate(-50%,-50%) rotate(-90deg)}
.matrix .ax b{color:var(--acc);font-weight:700}

/* — FUNNEL — */
.funnel{display:flex;flex-direction:column;align-items:center;gap:1.2cqh;margin-top:5cqh}
.frow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:2cqw;width:64cqw}
.frow .fb{height:6.4cqh;border-radius:.8cqh;background:linear-gradient(90deg,var(--ink-3),rgba(158,217,196,.35));margin:0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:2.2cqh;color:var(--paper);width:var(--w,100%)}
.frow:last-child .fb{background:linear-gradient(90deg,var(--acc),var(--acc-2));color:var(--ink)}
.frow .fv{font-family:var(--mono);font-size:1.9cqh;color:var(--muted);font-weight:700;min-width:9cqw}
.frow:last-child .fv{color:var(--acc-2)}
.frow .fbwrap{display:flex;justify-content:center}

/* — PYR / morph pirámide ↔ rombo (botón interactivo) — */
.shape-wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:5cqw;margin-top:4cqh;align-items:center;height:60cqh}
.shape-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4cqh;height:100%}
.pyr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4cqh;width:100%}
.pbar{height:7.4cqh;border-radius:.4cqh;background:linear-gradient(90deg,var(--acc-2),var(--acc));transition:width 1.1s cubic-bezier(.3,.7,.2,1),opacity .9s ease,background .9s ease}
.pbar.l0{width:18%}.pbar.l1{width:36%}.pbar.l2{width:54%}.pbar.l3{width:72%}.pbar.l4{width:90%}
.pyr.is-rhombus .pbar.l0{width:18%}
.pyr.is-rhombus .pbar.l1{width:54%}
.pyr.is-rhombus .pbar.l2{width:90%}
.pyr.is-rhombus .pbar.l3{width:54%}
.pyr.is-rhombus .pbar.l4{width:18%;opacity:.28;background:repeating-linear-gradient(45deg,var(--muted),var(--muted) 2px,transparent 2px,transparent 7px)}
.morph-btn{font-family:var(--mono);font-size:1.9cqh;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--acc);border:1px solid var(--acc);border-radius:999px;padding:1.6cqh 2.6cqw;cursor:pointer;transition:.25s ease;white-space:nowrap}
.morph-btn:hover{background:var(--acc);color:var(--ink)}
.shape-side .tag{margin-bottom:3.2cqh}
.shape-side .tag .k{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.2em;color:var(--acc);text-transform:uppercase}
.shape-side .tag .v{font-family:var(--display);font-size:3.2cqh;line-height:1.1;margin-top:.5cqh}
.shape-side .tag .v small{display:block;font-family:var(--sans);font-size:1.7cqh;color:var(--muted);margin-top:.6cqh;font-weight:400}

/* — STACK (capas de arquitectura apiladas) — */
.stack{display:flex;flex-direction:column;gap:1cqh;margin-top:5cqh;max-width:60cqw}
.slayer{display:grid;grid-template-columns:1fr auto;align-items:center;gap:2cqw;border-radius:1.4cqh;padding:2.2cqh 2.2cqw;border:1px solid var(--line);background:var(--fill-1)}
.slayer .lt{font-family:var(--display);font-size:2.6cqh;font-weight:700;letter-spacing:-.02em}
.slayer .ld{font-size:1.7cqh;color:var(--muted);margin-top:.4cqh}
.slayer .lr{font-family:var(--mono);font-size:1.5cqh;color:var(--muted);letter-spacing:.1em;white-space:nowrap}
.slayer.hot{border-color:var(--line-strong);background:linear-gradient(135deg,rgba(158,217,196,.12),rgba(215,255,99,.05))}
.slayer.hot .lt{color:var(--acc)}
.slayer.blue{border-color:rgba(169,199,255,.32)} .slayer.blue .lt{color:var(--blue)}
.slayer.coral{border-color:rgba(255,143,112,.32)} .slayer.coral .lt{color:var(--coral)}

/* — VENN (2 conjuntos, SVG) — */
.venn{display:flex;justify-content:center;margin-top:4cqh}
.venn svg{width:64cqw;height:46cqh;overflow:visible}
.venn .va{fill:rgba(158,217,196,.16);stroke:var(--acc);stroke-width:.5}
.venn .vb{fill:rgba(169,199,255,.14);stroke:var(--blue);stroke-width:.5}
.venn text{font-family:var(--display);font-weight:700;fill:var(--paper)}
.venn .vlab{font-size:5px;letter-spacing:-.02em}
.venn .vmid{font-size:4.4px;fill:var(--acc-2)}
.venn .vsub{font-family:var(--sans);font-weight:400;font-size:2.6px;fill:var(--muted)}

/* — RING STAT (número con anillo decorativo) — */
.ringstat{display:flex;align-items:center;gap:3cqw;margin-top:5cqh}
.ringstat .rs{position:relative;width:30cqh;height:30cqh;flex:0 0 auto}
.ringstat .rs svg{width:100%;height:100%;transform:rotate(-90deg)}
.ringstat .rs .v{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-size:7cqh;font-weight:700;letter-spacing:-.04em;color:var(--acc)}
.ringstat .rtxt{font-family:var(--display);font-size:3.6cqh;line-height:1.16;letter-spacing:-.02em;max-width:42cqw}
.ringstat .rtxt small{display:block;font-family:var(--sans);font-size:2cqh;color:var(--muted);margin-top:1.4cqh;font-weight:400;line-height:1.45}

/* — MEDIA: imagen/vídeo a sangre y split — */
.scene.bleed{padding:0}
.media-full{position:absolute;inset:0}
.media-full img,.media-full video{width:100%;height:100%;object-fit:cover;display:block}
.media-full .ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(7,9,10,.92),rgba(7,9,10,.25) 55%,rgba(7,9,10,.55))}
.media-full .cap{position:absolute;left:8cqw;right:8cqw;bottom:8cqh;z-index:2}
.media-full .cap.mid{top:50%;bottom:auto;transform:translateY(-50%);text-align:center}
.media-split{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr}
.media-split.rev{direction:rtl}.media-split.rev>*{direction:ltr}
.media-split .mtext{padding:9cqh 6cqw;display:flex;flex-direction:column;justify-content:center}
.media-split .mvis{position:relative;overflow:hidden}
.media-split .mvis img,.media-split .mvis video{width:100%;height:100%;object-fit:cover;display:block}
.video-wrap{position:absolute;inset:0;background:#000}
.video-wrap iframe{width:100%;height:100%;border:0;display:block}
.media-credit{position:absolute;right:8cqw;bottom:3cqh;font-family:var(--mono);font-size:1.3cqh;color:rgba(247,244,236,.5);z-index:3}

/* — PYRAMID configurable (niveles con etiqueta) — */
.pyramid{display:flex;flex-direction:column;align-items:center;gap:1cqh;margin-top:5cqh}
.pyramid.inv{flex-direction:column-reverse}
.plvl{display:flex;align-items:center;justify-content:center;height:7.2cqh;border-radius:.6cqh;font-family:var(--display);font-weight:700;font-size:2.5cqh;letter-spacing:-.02em;color:var(--ink);background:linear-gradient(90deg,var(--acc-2),var(--acc));box-shadow:0 6cqh 14cqh -8cqh rgba(158,217,196,.5)}
.plvl .sub{font-family:var(--sans);font-weight:500;font-size:1.5cqh;opacity:.8;margin-left:1.2cqw}

/* — ICON GRID (capacidades con icono) — */
.icongrid{display:grid;grid-template-columns:repeat(var(--n,4),1fr);gap:2cqw;margin-top:5cqh}
.igc{background:var(--fill-1);border:1px solid var(--line);border-radius:1.8cqh;padding:3.2cqh 1.8cqw;text-align:center}
.igc .ig-ic{color:var(--acc);margin-bottom:1.4cqh}
.igc .ig-t{font-family:var(--display);font-weight:700;font-size:2.5cqh;letter-spacing:-.02em;line-height:1.1}
.igc .ig-d{font-size:1.75cqh;color:var(--muted);margin-top:.8cqh;line-height:1.4}
.igc.blue .ig-ic{color:var(--blue)} .igc.coral .ig-ic{color:var(--coral)} .igc.gold .ig-ic{color:var(--gold)} .igc.purple .ig-ic{color:var(--purple)}

/* — BIGNUM: número héroe — */
.bignum{display:flex;flex-direction:column;justify-content:center;height:100%}
.bignum .bn{font-family:var(--display);font-weight:700;font-size:22cqh;line-height:.86;letter-spacing:-.05em;color:var(--acc)}
.bignum .bn small{font-size:8cqh;color:var(--paper-2);font-weight:600}
.bignum .bctx{font-size:3.2cqh;color:var(--paper);max-width:62cqw;margin-top:2.4cqh;line-height:1.25}
.bignum .bnote{font-family:var(--mono);font-size:1.6cqh;color:var(--muted);margin-top:2.4cqh;letter-spacing:.04em}

/* — BENTO: rejilla asimétrica — */
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:2cqh 2cqw;margin-top:4.5cqh;height:64cqh}
.bento .bc{background:var(--fill-1);border:1px solid var(--line);border-radius:2cqh;padding:3cqh 2cqw;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;position:relative}
.bento .bc.wide{grid-column:span 2}.bento .bc.tall{grid-row:span 2}.bento .bc.big{grid-column:span 2;grid-row:span 2}
.bento .bc .bi{color:var(--acc);margin-bottom:1cqh}
.bento .bc .bfig{font-family:var(--display);font-weight:700;font-size:7cqh;color:var(--acc);letter-spacing:-.03em;line-height:1}
.bento .bc .bt{font-family:var(--display);font-weight:700;font-size:3cqh;letter-spacing:-.02em;line-height:1.05;margin-top:auto}
.bento .bc .bd{font-size:1.85cqh;color:var(--muted);line-height:1.4;margin-top:.8cqh}
.bento .bc.accent{background:linear-gradient(135deg,var(--acc),var(--acc-2));border-color:transparent}
.bento .bc.accent .bt,.bento .bc.accent .bfig,.bento .bc.accent .bi{color:var(--ink)}
.bento .bc.accent .bd{color:rgba(11,31,34,.78)}
.bento .bc.dark{background:var(--ink-3)}

/* — BARCHART: barras verticales — */
.barchart{display:flex;align-items:flex-end;gap:3cqw;height:52cqh;margin-top:5cqh;padding:0 1cqw}
.barchart .bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:1.2cqh}
.barchart .bval{font-family:var(--display);font-weight:700;font-size:2.6cqh;color:var(--acc)}
.barchart .bbar{width:100%;max-width:9cqw;border-radius:1cqh 1cqh 0 0;background:linear-gradient(180deg,var(--acc),var(--mint-3));min-height:.6cqh;transition:height .6s}
.barchart .bbar.alt{background:linear-gradient(180deg,var(--blue),rgba(169,199,255,.25))}
.barchart .bbar.coral{background:linear-gradient(180deg,var(--coral),rgba(255,143,112,.25))}
.barchart .blbl{font-size:1.85cqh;color:var(--muted);text-align:center;line-height:1.2}

/* — GALLERY: imágenes en rejilla — */
.gallery{display:grid;gap:2cqh 2cqw;margin-top:4.5cqh;height:64cqh}
.gallery.g2{grid-template-columns:1fr 1fr}.gallery.g3{grid-template-columns:1fr 1fr 1fr}
.gallery.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.gallery .gimg{border-radius:1.6cqh;overflow:hidden;position:relative;background:var(--fill-1);border:1px solid var(--line)}
.gallery .gimg img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .gimg .gcap{position:absolute;left:0;right:0;bottom:0;padding:4cqh 1.5cqw 1.4cqh;background:linear-gradient(0deg,rgba(7,9,10,.88),transparent);font-size:1.85cqh;font-weight:600}
.gallery .gimg .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);font-family:var(--mono);font-size:1.6cqh}

/* — PROFILE: equipo — */
.profiles{display:grid;grid-template-columns:repeat(var(--n,3),1fr);gap:4cqw;margin-top:5cqh}
.prof{text-align:center;display:flex;flex-direction:column;align-items:center}
.prof .pav{width:20cqh;height:20cqh;border-radius:50%;overflow:hidden;background:var(--fill-1);border:1px solid var(--line-2);margin-bottom:2cqh}
.prof .pav img{width:100%;height:100%;object-fit:cover}
.prof .pav .ph{width:100%;height:100%;display:grid;place-items:center;color:var(--muted)}
.prof .pn{font-family:var(--display);font-weight:700;font-size:2.7cqh;letter-spacing:-.02em}
.prof .pr{font-size:1.95cqh;color:var(--acc);margin-top:.5cqh;font-weight:600}
.prof .pd{font-size:1.7cqh;color:var(--muted);margin-top:1.2cqh;line-height:1.4;max-width:24cqw}

/* — FEATURE MATRIX: ✓/✗ — */
.fmx{margin-top:4cqh;display:grid;gap:0;border:1px solid var(--line);border-radius:1.6cqh;overflow:hidden}
.fmx .fr{display:grid;grid-template-columns:var(--cols);align-items:center}
.fmx .fr+.fr{border-top:1px solid var(--line)}
.fmx .fr.fh{background:var(--ink-3)}
.fmx .fr.fh span{font-family:var(--mono);font-size:1.5cqh;letter-spacing:.08em;text-transform:uppercase;color:var(--mint);font-weight:700;padding:2.4cqh 2cqw}
.fmx .fr.fh span.hi{color:var(--acc-2)}
.fmx .fr .fcell{padding:2.2cqh 2cqw;font-size:2cqh;text-align:center}
.fmx .fr .fcell.lab{text-align:left;color:var(--paper);font-weight:600}
.fmx .fr .yes{color:var(--acc)}.fmx .fr .no{color:rgba(247,244,236,.25)}
.fmx .fr .fcell.col-hi{background:rgba(158,217,196,.06)}

/* — CYCLE: proceso circular — */
.cycle{position:relative;width:50cqh;height:50cqh;margin:4cqh auto 0}
.cycle .cmid{position:absolute;inset:30%;border-radius:50%;background:var(--fill-1);border:1px dashed var(--line-2);display:grid;place-items:center;text-align:center;padding:2cqh}
.cycle .cmid .cmt{font-family:var(--display);font-weight:700;font-size:2.4cqh;letter-spacing:-.02em}
.cycle .cnode{position:absolute;width:20cqh;height:20cqh;margin:-10cqh 0 0 -10cqh;border-radius:50%;background:var(--ink-3);border:1px solid var(--line-strong);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5cqh}
.cycle .cnode .ci{color:var(--acc);margin-bottom:.6cqh}
.cycle .cnode .cnt{font-family:var(--display);font-weight:700;font-size:2cqh;line-height:1.05;letter-spacing:-.02em}
.cycle .cnode .cnd{font-size:1.4cqh;color:var(--muted);margin-top:.4cqh;line-height:1.25}

/* — QUOTECARD: cita con retrato — */
.quotecard{display:grid;grid-template-columns:30cqh 1fr;gap:5cqw;align-items:center;height:100%}
.quotecard .qav{width:30cqh;height:36cqh;border-radius:2.5cqh;overflow:hidden;background:var(--fill-1);border:1px solid var(--line-2)}
.quotecard .qav img{width:100%;height:100%;object-fit:cover}
.quotecard .qav .ph{width:100%;height:100%;display:grid;place-items:center;color:var(--muted)}
.quotecard .qbody .qmk{font-family:var(--display);font-size:9cqh;line-height:.5;color:var(--acc);opacity:.5}
.quotecard .qbody .qtx{font-family:var(--display);font-weight:600;font-size:4.2cqh;letter-spacing:-.02em;line-height:1.18;margin-top:1cqh}
.quotecard .qbody .qau{font-size:2.2cqh;color:var(--muted);margin-top:2.6cqh}
.quotecard .qbody .qau b{color:var(--acc);font-weight:700}

/* — PRICING: tarjetas de precio — */
.pricing{display:grid;grid-template-columns:repeat(var(--n,3),1fr);gap:2.4cqw;margin-top:4.5cqh}
.pcard{background:var(--fill-1);border:1px solid var(--line);border-radius:2cqh;padding:3.4cqh 2cqw;display:flex;flex-direction:column;position:relative}
.pcard.hot{border-color:var(--acc);background:linear-gradient(180deg,rgba(158,217,196,.1),var(--fill-1));box-shadow:0 10cqh 30cqh -16cqh var(--acc)}
.pcard .ptag{font-family:var(--mono);font-size:1.45cqh;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.pcard.hot .ptag{color:var(--acc)}
.pcard .pprice{font-family:var(--display);font-weight:700;font-size:5.6cqh;letter-spacing:-.03em;margin:1.4cqh 0;line-height:1}
.pcard .pprice small{font-size:1.9cqh;color:var(--muted);font-weight:500}
.pcard .pfeats{list-style:none;display:flex;flex-direction:column;gap:1.3cqh;margin-top:1cqh}
.pcard .pfeats li{font-size:1.85cqh;color:var(--paper-2);display:flex;gap:1cqw;align-items:flex-start}
.pcard .pfeats li svg{width:2cqh;height:2cqh;color:var(--acc);flex:0 0 auto;margin-top:.25cqh}

/* — PROGRESS: barras horizontales — */
.progress{display:flex;flex-direction:column;gap:3cqh;margin-top:5cqh;max-width:84cqw}
.pbar-row .pbh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1cqh}
.pbar-row .pbn{font-family:var(--display);font-weight:600;font-size:2.4cqh;letter-spacing:-.02em}
.pbar-row .pbv{font-family:var(--mono);font-weight:700;font-size:2.2cqh;color:var(--acc)}
.pbar-row .pbtrack{height:1.6cqh;background:var(--fill-1);border-radius:1cqh;overflow:hidden}
.pbar-row .pbfill{height:100%;border-radius:1cqh;background:linear-gradient(90deg,var(--acc-2),var(--acc))}

/* — LINECHART: línea/área — */
.linechart{margin-top:5cqh}
.linechart svg{width:100%;height:46cqh;overflow:visible}
.linechart .lc-line{fill:none;stroke:var(--acc);stroke-width:.7;stroke-linecap:round;stroke-linejoin:round}
.linechart .lc-grid{stroke:rgba(247,244,236,.1);stroke-width:.25}
.linechart .lc-axis{fill:var(--muted);font-size:2.3px;font-family:var(--mono);text-anchor:end}
.linechart .lc-dot{fill:var(--ink);stroke:var(--acc);stroke-width:.6}
.linechart .lc-lbl{fill:var(--muted);font-size:2.4px;font-family:var(--mono);text-anchor:middle}
.linechart .lc-val{fill:var(--paper);font-size:2.6px;font-family:var(--display);font-weight:700;text-anchor:middle}

/* — VTIMELINE: línea de tiempo vertical — */
.vtimeline{margin-top:3.5cqh;position:relative;padding-left:6cqw}
.vtimeline::before{content:"";position:absolute;left:1.5cqw;top:1cqh;bottom:1cqh;width:2px;background:var(--line-strong)}
.vt-item{position:relative;padding-bottom:3.2cqh}
.vt-item:last-child{padding-bottom:0}
.vt-item::before{content:"";position:absolute;left:-4.1cqw;top:.5cqh;width:1.7cqh;height:1.7cqh;border-radius:50%;background:var(--acc);box-shadow:0 0 0 4px var(--ink)}
.vt-item.off::before{background:var(--ink-3);border:2px solid var(--line-strong)}
.vt-item .vtt{font-family:var(--mono);font-size:1.5cqh;color:var(--acc);letter-spacing:.05em}
.vt-item.off .vtt{color:var(--muted)}
.vt-item .vth{font-family:var(--display);font-weight:700;font-size:3cqh;letter-spacing:-.02em;margin-top:.3cqh}
.vt-item .vtd{font-size:1.95cqh;color:var(--muted);margin-top:.5cqh;line-height:1.4;max-width:62cqw}

/* — PROS/CONS — */
.proscons{display:grid;grid-template-columns:1fr 1fr;gap:3cqw;margin-top:4.5cqh}
.pcside{border:1px solid var(--line);border-radius:1.8cqh;padding:3cqh 2cqw}
.pcside.pro{border-color:var(--line-strong)}
.pcside h4{font-family:var(--mono);font-size:1.6cqh;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2cqh;display:flex;align-items:center;gap:1cqw}
.pcside.pro h4{color:var(--acc)}.pcside.con h4{color:var(--coral)}
.pcside ul{list-style:none;display:flex;flex-direction:column;gap:1.4cqh}
.pcside li{font-size:1.95cqh;color:var(--paper-2);display:flex;gap:1cqw;align-items:flex-start;line-height:1.35}
.pcside li svg{width:2cqh;height:2cqh;flex:0 0 auto;margin-top:.3cqh}
.pcside.pro li svg{color:var(--acc)}.pcside.con li svg{color:var(--coral)}

/* — CHECKLIST — */
.checklist{display:flex;flex-direction:column;gap:1.8cqh;margin-top:4cqh;max-width:80cqw}
.chk{display:flex;gap:1.6cqw;align-items:flex-start;font-size:2.3cqh;line-height:1.35}
.chk .ck{width:3cqh;height:3cqh;border-radius:.8cqh;background:var(--acc);color:var(--ink);display:grid;place-items:center;flex:0 0 auto;margin-top:.2cqh}
.chk .ck svg{width:2cqh;height:2cqh}
.chk.off .ck{background:transparent;border:1px solid var(--line-strong)}
.chk b{font-weight:700;color:var(--paper)}

/* — LOGO WALL — */
.logowall{display:grid;grid-template-columns:repeat(var(--n,4),1fr);gap:2cqw;margin-top:5cqh}
.logo-cell{aspect-ratio:16/9;background:var(--fill-1);border:1px solid var(--line);border-radius:1.4cqh;display:grid;place-items:center;padding:2cqh;overflow:hidden}
.logo-cell img{max-width:78%;max-height:64%;object-fit:contain}
.logo-cell span{font-family:var(--display);font-weight:700;font-size:2.6cqh;color:var(--paper-2);letter-spacing:-.02em;text-align:center}

/* — CTA: cierre — */
.cta{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
.cta .ctah{font-family:var(--display);font-weight:700;font-size:6.8cqh;letter-spacing:-.03em;line-height:1.05;max-width:82cqw}
.cta .ctas{font-size:2.6cqh;color:var(--muted);margin-top:2.4cqh;max-width:62cqw;line-height:1.35}
.cta .ctabtn{margin-top:4.4cqh;display:inline-flex;align-items:center;gap:1.5cqw;background:var(--acc);color:var(--ink);font-family:var(--display);font-weight:700;font-size:2.6cqh;padding:2cqh 3.5cqw;border-radius:1.4cqh}
.cta .ctabtn svg{width:2.6cqh;height:2.6cqh}
.cta .ctameta{font-family:var(--mono);font-size:1.6cqh;color:var(--muted);margin-top:2.6cqh;letter-spacing:.04em}

/* — EXTRAS universales por slide — */
.scene>.sbgimg{position:absolute;inset:0;z-index:0;overflow:hidden}
.scene>.sbgimg img{width:100%;height:100%;object-fit:cover}
.scene>.sbgimg .sbgov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,9,10,.82),rgba(7,9,10,.62))}
.scene:has(>.sbgimg)>:not(.sbgimg){position:relative;z-index:1}
.sbadge{position:absolute;z-index:4;font-family:var(--mono);font-size:1.5cqh;letter-spacing:.08em;text-transform:uppercase;background:var(--acc);color:var(--ink);font-weight:700;padding:.9cqh 1.6cqw;border-radius:.9cqh}
.sbadge.tr{top:6cqh;right:6cqw}.sbadge.tl{top:6cqh;left:6cqw}.sbadge.br{bottom:6cqh;right:6cqw}.sbadge.bl{bottom:6cqh;left:6cqw}
.sbadge.line{background:transparent;border:1px solid var(--acc);color:var(--acc)}
.sfoot-x{position:absolute;left:6.2cqw;bottom:3.6cqh;z-index:4;font-family:var(--mono);font-size:1.4cqh;color:var(--muted);letter-spacing:.04em}
.stag-side{position:absolute;right:2.6cqw;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:right center;white-space:nowrap;font-family:var(--mono);font-size:1.35cqh;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);z-index:4}

/* — FLIP: invertir disposición de 2 columnas — */
.scene.flip .twocol{direction:rtl}.scene.flip .twocol>*{direction:ltr}
.scene.flip .compare{direction:rtl}.scene.flip .compare>*{direction:ltr}
.scene.flip .proscons{direction:rtl}.scene.flip .proscons>*{direction:ltr}
.scene.flip .quotecard{direction:rtl}.scene.flip .quotecard>*{direction:ltr}
.scene.flip .splitstat{direction:rtl}.scene.flip .splitstat>*{direction:ltr}

/* — THREECOL: tres columnas de texto — */
.threecol{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3cqw;margin-top:4.5cqh}
.threecol .tc3 .tcn{color:var(--acc);font-family:var(--mono);font-size:1.55cqh;letter-spacing:.06em}
.threecol .tc3 .tch{font-family:var(--display);font-weight:700;font-size:3cqh;letter-spacing:-.02em;padding-bottom:1.4cqh;border-bottom:1px solid var(--line-strong);margin:.6cqh 0 1.6cqh}
.threecol .tc3 p{font-size:1.95cqh;color:var(--muted);line-height:1.45}

/* — SPLITSTAT: dato grande + cuerpo — */
.splitstat{display:grid;grid-template-columns:1fr 1fr;gap:5cqw;align-items:center;height:100%}
.splitstat .ssfig{font-family:var(--display);font-weight:700;font-size:15cqh;color:var(--acc);letter-spacing:-.04em;line-height:.86}
.splitstat .ssfig small{font-size:5cqh;color:var(--paper-2)}
.splitstat .sslbl{font-size:2.3cqh;color:var(--paper);margin-top:1.5cqh;line-height:1.3}
.splitstat .ssbody h3{font-family:var(--display);font-weight:700;font-size:3.4cqh;letter-spacing:-.02em;margin-bottom:2cqh;line-height:1.1}
.splitstat .ssbody ul{list-style:none;display:flex;flex-direction:column;gap:1.4cqh}
.splitstat .ssbody li{font-size:2cqh;color:var(--paper-2);display:flex;gap:1cqw;align-items:flex-start;line-height:1.35}
.splitstat .ssbody li svg{width:2cqh;height:2cqh;color:var(--acc);flex:0 0 auto;margin-top:.3cqh}

/* — BANNER: capítulo / transición — */
.banner{display:flex;flex-direction:column;justify-content:center;height:100%}
.banner .bnk{font-family:var(--mono);font-size:1.9cqh;letter-spacing:.2em;text-transform:uppercase;color:var(--acc)}
.banner .bnt{font-family:var(--display);font-weight:700;font-size:8cqh;letter-spacing:-.03em;line-height:1;margin-top:1.6cqh;max-width:88cqw}
.banner .bnd{font-size:2.4cqh;color:var(--muted);margin-top:2.2cqh;max-width:62cqw;line-height:1.35}

/* ============================================================
   PIES Y HUD
   ============================================================ */{position:absolute;left:8cqw;bottom:5cqh;font-family:var(--mono);font-size:1.4cqh;color:var(--muted);opacity:.65;letter-spacing:.04em}
.foot{position:absolute;left:8cqw;bottom:6cqh;display:flex;gap:2cqw;align-items:center}
.foot .dot{width:.9cqh;height:.9cqh;border-radius:50%;background:var(--acc)}
.foot .ft{font-family:var(--mono);font-size:1.6cqh;letter-spacing:.16em;color:var(--muted)}

.hud{position:fixed;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,.06);z-index:30}
.hud > i{display:block;height:100%;width:0;background:var(--acc);transition:width .4s ease;box-shadow:0 0 18px rgba(158,217,196,.5)}
.counter{position:fixed;bottom:14px;right:18px;font-family:var(--mono);font-size:12px;color:var(--muted);z-index:30;letter-spacing:.1em}
.counter b{color:var(--mint-2)}
.nav{position:fixed;bottom:10px;left:18px;display:flex;gap:8px;z-index:30}
.nav button{font-family:var(--mono);background:transparent;border:1px solid var(--line);color:var(--muted);width:30px;height:26px;border-radius:4px;cursor:pointer;font-size:13px;transition:.2s}
.nav button:hover{border-color:var(--acc);color:var(--acc)}
.hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;color:var(--muted);opacity:.55;z-index:30;letter-spacing:.12em}
@media (max-width:700px){.hint{display:none}}
@media print{body{background:#fff}.hud,.counter,.nav,.hint{display:none}}
</style>
</head>

  <div class="slide" id="slide">
    <canvas id="net"></canvas>
    <div class="bgfx"></div>
    <div class="crop tl"></div><div class="crop tr"></div><div class="crop bl"></div><div class="crop br"></div>

    <div class="brand cob">
      <img src="https://dondeestudiar.eu/wp-content/uploads/2023/12/thePower-LOGO-CARD.png" alt="thePower">
      <span class="x">×</span>
      <span class="chipw"><img src="[URL logo cliente]" alt="[Cliente]"></span>
    </div> -->

    <!--SCENES-->
  </div>
</div>

<div class="hud"><i id="bar"></i></div>
<div class="counter"><b id="cur">01</b> / <span id="tot">__TOT__</span></div>
<div class="nav"><button id="prev">‹</button><button id="next">›</button></div>
<div class="hint">← →  navegar   ·   F  pantalla completa</div>

<script>
  /* ===== navegación — NO TOCAR salvo para añadir features ===== */
  const scenes=[...document.querySelectorAll('.scene')];
  let i=0; const tot=scenes.length;
  document.getElementById('tot').textContent=String(tot).padStart(2,'0');
  function show(n){
    i=Math.max(0,Math.min(tot-1,n));
    scenes.forEach((s,k)=>s.classList.toggle('active',k===i));
    document.getElementById('cur').textContent=String(i+1).padStart(2,'0');
    document.getElementById('bar').style.width=(tot>1?(i/(tot-1)*100):100)+'%';
    /* reset de morphs al cambiar de slide */
    document.querySelectorAll('.pyr.is-rhombus').forEach(p=>p.classList.remove('is-rhombus'));
    document.querySelectorAll('.morph-btn').forEach(b=>{ if(b.dataset.a) b.textContent=b.dataset.a; });
  }
  const next=()=>show(i+1), prev=()=>show(i-1);
  document.getElementById('next').onclick=next;
  document.getElementById('prev').onclick=prev;
  addEventListener('keydown',e=>{
    if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();next()}
    else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();prev()}
    else if(e.key==='Home'){show(0)} else if(e.key==='End'){show(tot-1)}
    else if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}
  });
  /* clic avanza, salvo en elementos interactivos */
  document.getElementById('slide').addEventListener('click',e=>{
    if(!e.target.closest('.nav,button,a,.morph-btn')) next();
  });
  /* morph pirámide↔rombo: cualquier .morph-btn togglea el .pyr de su escena */
  document.querySelectorAll('.morph-btn').forEach(btn=>{
    btn.dataset.a=btn.textContent;
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const p=btn.closest('.scene').querySelector('.pyr'); if(!p)return;
      const on=p.classList.toggle('is-rhombus');
      btn.textContent=on?(btn.dataset.b||'↺ Volver'):btn.dataset.a;
    });
  });

  /* ===== red de nodos de fondo (opcional). Borra este bloque y <canvas id="net"> si no la quieres ===== */
  (function(){
    const cv=document.getElementById('net'); if(!cv)return;
    const cx=cv.getContext('2d'); let W,H,nodes;
    function init(){
      const r=cv.getBoundingClientRect(); cv.width=W=r.width; cv.height=H=r.height;
      const N=Math.round(W/26);
      nodes=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12}));
    }
    function draw(){
      cx.clearRect(0,0,W,H);
      for(const n of nodes){n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;}
      for(let a=0;a<nodes.length;a++){
        for(let b=a+1;b<nodes.length;b++){
          const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y,d=Math.hypot(dx,dy);
          if(d<W*0.10){cx.strokeStyle='rgba(158,217,196,'+(0.06*(1-d/(W*0.10)))+')';cx.lineWidth=1;cx.beginPath();cx.moveTo(nodes[a].x,nodes[a].y);cx.lineTo(nodes[b].x,nodes[b].y);cx.stroke();}
        }
        cx.fillStyle='rgba(236,230,218,.22)';cx.beginPath();cx.arc(nodes[a].x,nodes[a].y,1.3,0,7);cx.fill();
      }
      requestAnimationFrame(draw);
    }
    addEventListener('resize',init); init(); draw();
  })();

  show(0);
</script>
